# Netlify deploy config for SIUUU.
#
# WHY `precompute` IS NOT IN THE BUILD COMMAND
#
# It cannot run here. `npm run precompute` reads `exact-match-txline-raw/` — a 91MB
# capture that is gitignored and therefore NOT in this repo and NOT on this build
# box — and `--prove` additionally needs a funded devnet keypair and live TxODDS
# credentials. A build box has none of those. Putting it in the build command fails
# the deploy outright.
#
# So precompute runs LOCALLY, on a machine that has the corpus, and its output —
# src/generated/demo-proofs.json and src/generated/proven-stats.ts — is COMMITTED.
# Those two files are the deployed site's only data source: nothing here calls the
# verifier at request time, because doing so is how the homepage came to 500.
#
# Re-running it requires a box with the corpus (and, for --prove, devnet creds). If
# you do not have the corpus, you cannot regenerate these files — and you must not
# hand-edit them, because every number and hash in them was computed by the real
# engine and every MERKLE_PROVEN tier was a validateStat call that actually ran.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Next.js telemetry off — nothing about this build is interesting to anyone.
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js on Netlify needs this plugin for SSR/route handlers.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Sponsor logos and any static art are immutable — hash-named or hand-placed.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[context.production.environment]
  SIUUU_NETWORK = "devnet"

[context.deploy-preview.environment]
  SIUUU_NETWORK = "devnet"
